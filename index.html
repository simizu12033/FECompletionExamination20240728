<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FE修了試験 対策</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="問題ナビゲーション">
        <div class="brand">
          <div class="brand-mark">FE</div>
          <div>
            <h1>修了試験対策</h1>
            <p>全60問</p>
          </div>
        </div>

        <div class="status-panel">
          <div>
            <span class="label">進捗</span>
            <strong id="progressText">0 / 60</strong>
          </div>
          <div>
            <span class="label">時間</span>
            <strong id="timerText">00:00</strong>
          </div>
        </div>

        <div class="progress-bar" aria-hidden="true">
          <div id="progressFill"></div>
        </div>

        <div class="filter-tabs" role="tablist" aria-label="表示フィルタ">
          <button class="tab active" data-filter="all" type="button">全問</button>
          <button class="tab" data-filter="unanswered" type="button">未回答</button>
          <button class="tab" data-filter="marked" type="button">見直し</button>
        </div>

        <div id="questionGrid" class="question-grid" aria-label="問題一覧"></div>

        <div class="side-actions">
          <button id="reviewButton" class="ghost-button" type="button">解答一覧</button>
          <button id="resetButton" class="ghost-button danger" type="button">リセット</button>
        </div>
      </aside>

      <main class="main-panel">
        <header class="topbar">
          <div>
            <span class="eyebrow">科目A 過去問題</span>
            <h2 id="questionTitle">問1</h2>
          </div>
          <div class="toolbar" aria-label="操作">
            <button id="zoomOutButton" class="icon-button" type="button" title="縮小">-</button>
            <span id="zoomText" class="zoom-label">100%</span>
            <button id="zoomInButton" class="icon-button" type="button" title="拡大">+</button>
            <button id="markButton" class="mark-button" type="button">見直し</button>
          </div>
        </header>

        <section class="question-stage" aria-live="polite">
          <div class="image-frame">
            <img id="questionImage" src="assets/mon01.png" alt="問1の問題画像">
          </div>
        </section>

        <section class="answer-panel" aria-label="解答選択">
          <div class="choice-row">
            <button class="choice-button" data-choice="ア" type="button">ア</button>
            <button class="choice-button" data-choice="イ" type="button">イ</button>
            <button class="choice-button" data-choice="ウ" type="button">ウ</button>
            <button class="choice-button" data-choice="エ" type="button">エ</button>
          </div>
          <div class="nav-row">
            <button id="prevButton" class="nav-button" type="button">前へ</button>
            <button id="clearButton" class="nav-button secondary" type="button">回答を消す</button>
            <button id="nextButton" class="nav-button primary" type="button">次へ</button>
          </div>
        </section>
      </main>
    </div>

    <dialog id="reviewDialog">
      <form method="dialog" class="dialog-card">
        <div class="dialog-header">
          <h2>解答一覧</h2>
          <button class="icon-button" value="close" type="submit" title="閉じる">x</button>
        </div>
        <div id="reviewList" class="review-list"></div>
        <div class="dialog-actions">
          <button id="copyButton" class="nav-button secondary" type="button">CSVをコピー</button>
          <button class="nav-button primary" value="close" type="submit">閉じる</button>
        </div>
      </form>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
